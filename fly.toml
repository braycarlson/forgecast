app = 'forgecast'
primary_region = 'yyz'

[build]

[env]
  MIX_ENV = "prod"
  POLLER = "true"
  PORT = "8080"
  GITHUB_OAUTH_REDIRECT_URI = "https://forgecast.io/api/auth/github/callback"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[mounts]
  source = "forgecast"
  destination = "/data"

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
